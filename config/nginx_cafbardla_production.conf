# ============================================================================
# nginx_cafbardla_production.conf
# Configuración Nginx como reverse proxy para CafBarDLA
# Soporta: HTTPS/SSL, WebSocket, compresión, caching
# 
# Ubicación:
#   - Linux: /etc/nginx/sites-available/cafbardla
#   - Windows Nginx: C:\nginx\conf\sites-available\cafbardla.conf
#
# Instalación de certificado SSL:
#   - Let's Encrypt: certbot certonly --standalone -d tudominio.com
#   - Ubicación: /etc/letsencrypt/live/tudominio.com/
# ============================================================================

# Upstream backend FastAPI
upstream cafbardla_backend {
    least_conn;
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s backup;
    keepalive 32;
}

# Redireccionar HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com www.tudominio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # Configuración SSL/TLS
    ssl_certificate /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Protocolos y ciphers seguros
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logs
    access_log /var/log/nginx/cafbardla_access.log;
    error_log /var/log/nginx/cafbardla_error.log warn;

    # Tamaño máximo de petición
    client_max_body_size 20M;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req zone=api_limit burst=20 nodelay;

    # ==========================================
    # Rutas API
    # ==========================================

    # Health check
    location /health {
        access_log off;
        proxy_pass http://cafbardla_backend;
        proxy_http_version 1.1;
    }

    # API v1 general
    location /api/v1/ {
        proxy_pass http://cafbardla_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # WebSocket específicamente
    location ~ ^/ws/ {
        proxy_pass http://cafbardla_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering off;
    }

    # Contenidos estáticos (CSS, JS, imágenes)
    location /static/ {
        alias /var/www/cafbardla/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Archivos estáticos raíz (favicon, etc)
    location = /favicon.ico {
        alias /var/www/cafbardla/app/static/favicon.ico;
        expires 30d;
        access_log off;
    }

    # Documentación de API (Swagger, ReDoc)
    location /docs {
        proxy_pass http://cafbardla_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://cafbardla_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://cafbardla_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Rechazar acceso a archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Archivos que no deben ser servidos
    location ~ \.(env|spec|sql|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

