services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cafbardla
      POSTGRES_USER: cafbardla
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafbardla_secure_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafbardla -d cafbardla"]
      interval: 5s
      timeout: 5s
      retries: 15

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://cafbardla:${POSTGRES_PASSWORD:-cafbardla_secure_change_me}@db:5432/cafbardla
      SECRET_KEY: ${SECRET_KEY:-MUST_CHANGE_IN_PRODUCTION}
      APP_NAME: CafBarDLA
      AUTO_CREATE_SCHEMA: "false"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
