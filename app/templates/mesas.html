{% extends "base.html" %}{% block content %}<header><div><p class="eyebrow">MAPA OPERATIVO</p><h1>Mesas y zonas</h1></div></header><div class="actions"><form action="/zonas" method="post"><input name="nombre" placeholder="Nueva zona" required><button>Crear zona</button></form><form action="/mesas" method="post"><select name="zona_id">{%for z in zonas%}<option value="{{z.id}}">{{z.nombre}}</option>{%endfor%}</select><input name="nombre" placeholder="Mesa, ej. B-4" required><input name="capacidad" type="number" value="4" min="1"><button>Agregar mesa</button></form></div>{%for z in zonas%}<section class="panel"><h2>{{z.nombre}}</h2><div class="floor">{%for m in z.mesas%}<a class="table {{m.estado}} {{m.forma}}" style="left:{{m.posicion_x}}%;top:{{m.posicion_y}}%" href="/comanda/{{m.id}}"><b>{{m.nombre}}</b><small>{{m.capacidad}} puestos</small><em>{{m.estado}}</em></a>{%endfor%}</div></section>{%endfor%}{%endblock%}
