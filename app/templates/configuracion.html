{% extends "base.html" %}{% block content %}<header><div><p class="eyebrow">MARCA, TRIBUTACIÓN Y ELECTRÓNICA</p><h1>Configuración de empresa</h1></div></header><section class="panel narrow"><form class="stack" action="/configuracion" method="post"><h2>Identidad y clasificación colombiana</h2><label>Nombre<input name="nombre" value="{{empresa.nombre}}" required></label><label>NIT<input name="nit" value="{{empresa.nit or ''}}"></label><div class="two-col"><label>Tipo de persona<select name="tipo_persona"><option value="juridica" {%if empresa.tipo_persona=='juridica'%}selected{%endif%}>Persona jurídica</option><option value="natural" {%if empresa.tipo_persona=='natural'%}selected{%endif%}>Persona natural</option></select></label><label>Tipo societario<select name="tipo_sociedad"><option value="">No aplica / por definir</option><option value="SAS" {%if empresa.tipo_sociedad=='SAS'%}selected{%endif%}>SAS</option><option value="LTDA" {%if empresa.tipo_sociedad=='LTDA'%}selected{%endif%}>LTDA</option><option value="SA" {%if empresa.tipo_sociedad=='SA'%}selected{%endif%}>SA</option></select></label></div><label>Régimen tributario<select name="regimen_tributario"><option value="ordinario" {%if empresa.regimen_tributario=='ordinario'%}selected{%endif%}>Ordinario</option><option value="simple" {%if empresa.regimen_tributario=='simple'%}selected{%endif%}>SIMPLE</option></select></label><label>Dirección<input name="direccion" value="{{empresa.direccion or ''}}"></label><label>Teléfono<input name="telefono" value="{{empresa.telefono or ''}}"></label><label>URL del logo<input name="logo_url" value="{{empresa.logo_url or ''}}"></label><div class="color-fields"><label>Color principal<input name="color_primario" type="color" value="{{empresa.color_primario}}"></label><label>Color secundario<input name="color_secundario" type="color" value="{{empresa.color_secundario}}"></label></div><div class="two-col"><label>Moneda<input name="moneda" value="{{empresa.moneda}}" maxlength="5" required></label><label>Impuesto global (%)<input name="impuesto_porcentaje" type="number" min="0" step="0.001" value="{{empresa.impuesto_porcentaje}}"></label></div><h2>Integración electrónica</h2><label><input type="checkbox" name="facturador_electronico" {%if empresa.facturador_electronico%}checked{%endif%}> La empresa opera como facturador electrónico</label><label>Proveedor tecnológico<input name="proveedor_tecnologico" value="{{empresa.proveedor_tecnologico or ''}}" placeholder="Se configura al contratarlo"></label><label>Modo<select name="modo_electronico"><option value="pruebas" {%if empresa.modo_electronico=='pruebas'%}selected{%endif%}>Pruebas</option><option value="produccion" {%if empresa.modo_electronico=='produccion'%}selected{%endif%}>Producción</option></select></label><div class="two-col"><label>Prefijo factura<input name="prefijo_factura" value="{{empresa.prefijo_factura}}"></label><label>Siguiente factura<input name="consecutivo_factura" type="number" min="1" value="{{empresa.consecutivo_factura}}"></label></div><div class="two-col"><label>Prefijo nómina<input name="prefijo_nomina" value="{{empresa.prefijo_nomina}}"></label><label>Siguiente nómina<input name="consecutivo_nomina" type="number" min="1" value="{{empresa.consecutivo_nomina}}"></label></div><label>ID software nómina del proveedor<input name="software_nomina_id" value="{{empresa.software_nomina_id or ''}}"></label><button>Guardar configuración</button></form></section>{%endblock%}
