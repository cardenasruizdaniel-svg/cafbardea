{% extends "base.html" %}{% block content %}<header><div><p class="eyebrow">EGRESOS</p><h1>Gastos</h1></div></header><section class="panel"><h2>Registrar gasto</h2><form class="form-grid" action="/gastos" method="post"><input type="date" name="fecha" required><input name="concepto" placeholder="Concepto" required><input name="categoria" placeholder="Categoría" required><input type="number" name="valor" min="1" step="0.01" placeholder="Valor" required><input name="proveedor" placeholder="Proveedor"><button>Guardar gasto</button></form></section><section class="panel"><table><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th>Proveedor</th><th>Valor</th></tr>{%for g in gastos%}<tr><td>{{g.fecha}}</td><td>{{g.concepto}}</td><td>{{g.categoria}}</td><td>{{g.proveedor or '—'}}</td><td>${{'{:,.0f}'.format(g.valor)}}</td></tr>{%endfor%}</table></section>{%endblock%}
