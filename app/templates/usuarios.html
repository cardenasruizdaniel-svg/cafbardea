{% extends "base.html" %}{% block content %}<header><div><p class="eyebrow">SEGURIDAD</p><h1>Usuarios y permisos</h1></div></header><section class="panel narrow"><h2>Crear usuario</h2><form class="stack" method="post" action="/usuarios"><input name="usuario" placeholder="Usuario de acceso" required><input name="password" type="password" minlength="8" placeholder="Contraseña temporal (mín. 8)" required><select name="rol"><option value="mesero">Mesero</option><option value="caja">Caja</option><option value="cocina">Cocina</option><option value="administrador">Administrador</option></select><select name="empleado_id"><option value="">Sin empleado relacionado</option>{%for e in empleados%}<option value="{{e.id}}">{{e.nombre}} · {{e.cargo}}</option>{%endfor%}</select><button>Crear acceso</button></form></section><section class="panel"><table><tr><th>Usuario</th><th>Rol</th><th>Estado</th><th>Acción</th></tr>{%for u in usuarios%}<tr><td>{{u.usuario}}</td><td>{{u.rol}}</td><td>{{'Activo' if u.activo else 'Inactivo'}}</td><td><form method="post" action="/usuarios/{{u.id}}/estado"><button class="secondary">{{'Desactivar' if u.activo else 'Activar'}}</button></form></td></tr>{%endfor%}</table></section>{%endblock%}
