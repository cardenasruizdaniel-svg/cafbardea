<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | CAFBARDLA</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>☕</text></svg>">
    
    <link rel="stylesheet" href="/static/css/design-system.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1d2e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background elements */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(15, 52, 96, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-30px) translateX(20px);
            }
            50% {
                transform: translateY(-60px) translateX(-20px);
            }
            75% {
                transform: translateY(-30px) translateX(20px);
            }
        }

        /* Main container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Login card */
        .login-card {
            background: rgba(26, 29, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(212, 175, 55, 0.2),
                0 0 60px rgba(212, 175, 55, 0.05);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            animation: zoomIn 0.8s ease-out;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            display: block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #d4af37 0%, #fef3c7 50%, #b87333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            font-size: 0.875rem;
            color: rgba(232, 234, 237, 0.5);
            margin-top: 8px;
            font-weight: 400;
        }

        .welcome-text {
            font-size: 0.95rem;
            color: rgba(232, 234, 237, 0.7);
            margin-top: 5px;
            font-weight: 300;
        }

        /* Form */
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Input fields */
        .form-group {
            position: relative;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.2s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(232, 234, 237, 0.05);
            border: 1.5px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(232, 234, 237, 0.4);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(232, 234, 237, 0.08);
            border-color: #d4af37;
            box-shadow: 
                0 0 0 3px rgba(212, 175, 55, 0.15),
                inset 0 0 0 1px rgba(212, 175, 55, 0.1);
        }

        .form-group input:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(232, 234, 237, 0.07);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Submit button */
        .submit-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #d4af37 0%, #e5c158 50%, #b87333 100%);
            border: none;
            border-radius: 12px;
            color: #0a0e27;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out backwards 0.4s;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e5c158 0%, #d4af37 50%, #c49a2e 100%);
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
        }

        /* Error message */
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fecaca;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            animation: shake 0.5s ease-in-out;
        }

        .error-box::before {
            content: '⚠️';
            font-size: 1.2rem;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }

        /* Footer text */
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: rgba(232, 234, 237, 0.4);
            font-weight: 300;
        }

        .footer-text strong {
            color: rgba(232, 234, 237, 0.6);
            font-weight: 500;
        }

        /* Loading state */
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn:disabled::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-left: 8px;
            border: 2px solid rgba(10, 14, 39, 0.3);
            border-top-color: #0a0e27;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 24px;
                border-radius: 16px;
            }

            .brand-name {
                font-size: 2rem;
            }

            .logo {
                font-size: 60px;
            }

            .logo-section {
                margin-bottom: 32px;
            }

            .form-group input {
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            .submit-btn {
                padding: 12px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <span class="logo">☕</span>
                <h1 class="brand-name">CAFBARDLA</h1>
                <p class="brand-subtitle">Sistema POS Premium</p>
                <p class="welcome-text">Bienvenido a tu restaurante</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="post">
                <div class="form-group">
                    <input 
                        type="text" 
                        name="usuario" 
                        placeholder="Usuario" 
                        autocomplete="username" 
                        required 
                        autofocus
                    >
                    <span class="input-icon">👤</span>
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="Contraseña" 
                        autocomplete="current-password" 
                        required
                    >
                    <span class="input-icon">🔐</span>
                </div>

                <button type="submit" class="submit-btn">
                    Iniciar Sesión
                </button>
            </form>

            <!-- Footer -->
            <div class="footer-text">
                <strong>Credenciales de prueba:</strong><br>
                Usuario: <strong>admin</strong> | Contraseña: <strong>Admin123*</strong>
            </div>
        </div>
    </div>

    <script>
        // Smooth form submission
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
        });

        // Focus animation
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
