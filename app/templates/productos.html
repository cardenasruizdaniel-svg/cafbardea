{% extends "base.html" %}{% block content %}<header><div><p class="eyebrow">CATÁLOGO COMERCIAL</p><h1>Productos y categorías</h1></div></header><section class="panel"><h2>Nueva categoría</h2><form class="inline-form" action="/productos/categorias" method="post"><input name="nombre" placeholder="Ej. Bebidas frías" required><button>Agregar categoría</button></form></section><section class="panel"><h2>Nuevo producto</h2><form class="form-grid" action="/productos" method="post"><input name="codigo" placeholder="Código" required><input name="nombre" placeholder="Nombre comercial" required><select name="categoria_id"><option value="">Sin categoría</option>{%for c in categorias%}<option value="{{c.id}}">{{c.nombre}}</option>{%endfor%}</select><select name="tipo"><option value="venta">Venta directa</option><option value="insumo">Insumo</option><option value="elaborado">Producto elaborado</option></select><input name="precio_venta" type="number" min="0" step="0.01" placeholder="Precio venta"><input name="costo" type="number" min="0" step="0.01" placeholder="Costo"><input name="existencias" type="number" min="0" step="0.001" placeholder="Saldo inicial"><input name="stock_minimo" type="number" min="0" step="0.001" placeholder="Stock mínimo"><button>Crear producto</button></form></section><section class="panel"><h2>Editar o desactivar productos</h2>{%for p in productos%}<form class="product-row" action="/productos/{{p.id}}/editar" method="post"><span class="code">{{p.codigo}}</span><input name="nombre" value="{{p.nombre}}" required><input name="precio_venta" type="number" min="0" step="0.01" value="{{p.precio_venta}}"><input name="costo" type="number" min="0" step="0.01" value="{{p.costo}}"><input name="stock_minimo" type="number" min="0" step="0.001" value="{{p.stock_minimo}}"><button>Guardar</button></form><form class="state-form" action="/productos/{{p.id}}/estado" method="post"><span class="muted">{{'Activo' if p.activo else 'Inactivo'}} · saldo {{p.existencias}}</span><button class="secondary">{{'Desactivar' if p.activo else 'Activar'}}</button></form>{%endfor%}</section>{%endblock%}
